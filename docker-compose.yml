# Nutrition App – Docker Compose (Complete Development Environment)
# ────────────────────────────────────────────────────────────────────────────
# Usage:
#   docker compose up -d --build             # Build images and start all services
#   docker compose up -d                     # Start all services
#   docker compose up -d backend             # Start backend services
#   docker compose logs -f backend           # Follow logs
#   docker compose down                      # Stop everything
#   docker compose down -v                   # Stop + delete volumes (WARNING: loses data)
# ────────────────────────────────────────────────────────────────────────────

version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: nutrition-database
    environment:
      POSTGRES_DB: nutrion
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppass
      TZ: UTC
    command: [ "postgres", "-c", "timezone=UTC" ]
    ports:
      - "5433:5432" # outside docker network dùng port 5433, inside docker network dùng port 5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U appuser -d nutrion" ]
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    container_name: nutrition-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
  backend:
    build: ./backend
    container_name: nutrition-backend
    ports:
      - "8080:8080"
    # env_file:
    #   - .env
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/nutrion?options=-c%20timezone=UTC
      - SPRING_DATASOURCE_USERNAME=appuser
      - SPRING_DATASOURCE_PASSWORD=apppass
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JAVA_TOOL_OPTIONS=-Duser.timezone=UTC
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
