# Nutrition App – Docker Compose (Complete Development Environment)
# ────────────────────────────────────────────────────────────────────────────
# Usage:
#   docker compose up -d                     # Start all services
#   docker compose up -d mongodb backend     # Start specific services
#   docker compose logs -f backend           # Follow logs
#   docker compose down                      # Stop everything
#   docker compose down -v                   # Stop + delete volumes (WARNING: loses data)
# ────────────────────────────────────────────────────────────────────────────

services:

  # ── Database ────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: nutrition_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: nutrition_db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - nutrition_net

  # ── Backend API (Spring Boot 3, Java 21) ────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nutrition_backend
    ports:
      - "8080:8080"
    depends_on:
      mongodb:
        condition: service_healthy
    env_file:
      - .env
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/nutrition_db
      SPRING_PROFILES_ACTIVE: docker
    restart: unless-stopped
    networks:
      - nutrition_net

  # ── AI Service (FastAPI, PyTorch) ───────────────────────────────────────
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: nutrition_ai
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      MODEL_CACHE_DIR: /models
    volumes:
      - model_cache:/models
    restart: unless-stopped
    networks:
      - nutrition_net

  # ── Admin Dashboard (React, TypeScript, Tailwind) ──────────────────────
  admin-dashboard:
    build:
      context: ./admin-dashboard
      dockerfile: Dockerfile
    container_name: nutrition_admin
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - nutrition_net

# ── Volumes ────────────────────────────────────────────────────────────────
volumes:
  mongodb_data:
  model_cache:

# ── Networks ───────────────────────────────────────────────────────────────
networks:
  nutrition_net:
    name: nutrition_network
    driver: bridge
